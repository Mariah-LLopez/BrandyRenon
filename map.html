<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Map | Brandy Renon</title>
  <meta name="description" content="Explore Colorado listings on an interactive map with quick links to property details.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-nav"></div>

  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <div class="section-header">
          <span class="eyebrow">Interactive search</span>
          <h1>Colorado Property Map</h1>
          <p>Select a marker to preview the property, review its status, and jump directly to the full detail page.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="map-shell">
          <div id="all-properties-map" class="map-full" aria-label="Full map of Colorado property listings"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/properties-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
