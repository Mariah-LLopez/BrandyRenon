<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Brandy Renon</title>
  <meta name="description" content="Set a new password for your Brandy Renon portal account.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content" class="login-shell">
    <section class="login-card" aria-labelledby="reset-title">
      <div class="login-brand">
        <span class="eyebrow">Set new password</span>
        <h1 id="reset-title">Reset Password</h1>
        <p>Enter and confirm your new password below.</p>
      </div>

      <!-- Shown after Supabase confirms the recovery token -->
      <div id="reset-form-container">
        <form id="reset-password-form" action="javascript:void(0);" novalidate>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input id="new-password" name="password" type="password" autocomplete="new-password"
              minlength="8" required aria-describedby="password-hint">
            <span id="password-hint" class="helper-text">Minimum 8 characters.</span>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input id="confirm-password" name="confirm_password" type="password"
              autocomplete="new-password" required>
          </div>
          <button id="reset-submit-btn" class="btn-primary login-submit" type="submit">Update Password</button>
          <div id="reset-status" class="form-status" aria-live="assertive"></div>
        </form>
      </div>

      <!-- Shown if the reset link is invalid or expired -->
      <div id="reset-invalid" hidden>
        <p class="form-status error-message">
          This reset link is invalid or has expired. Please <a href="login.html">return to sign in</a>.
        </p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
