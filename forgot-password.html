<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Brandy Renon</title>
  <meta name="description" content="Reset your Brandy Renon portal password.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content" class="login-shell">
    <section class="login-card" aria-labelledby="forgot-title">
      <div class="login-brand">
        <span class="eyebrow">Password reset</span>
        <h1 id="forgot-title">Forgot Password</h1>
        <p>Enter your account email address and we will send you a link to reset your password.</p>
      </div>

      <form id="forgot-password-form" action="javascript:void(0);" novalidate>
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" name="email" type="email" autocomplete="email" required>
        </div>
        <button class="btn-primary login-submit" type="submit">Send Reset Link</button>
        <div id="forgot-status" class="form-status" aria-live="assertive"></div>
      </form>

      <p class="consent-text" style="margin-top:1.5rem">
        <a href="login.html">&larr; Back to sign in</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
