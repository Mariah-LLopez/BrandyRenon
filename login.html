<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client &amp; Admin Portal | Brandy Renon</title>
  <meta name="description" content="Secure portal for real estate transaction clients and administrators.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-nav"></div>

  <main id="main-content" class="login-shell">
    <section class="login-card" aria-labelledby="portal-title">
      <div class="login-brand">
        <span class="eyebrow">Secure access</span>
        <h1 id="portal-title">Portal</h1>
        <p>Sign in to access your real estate transaction dashboard.</p>
      </div>

      <!-- Sign-in panel -->
      <div id="panel-signin">
        <form id="login-form" action="javascript:void(0);" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <div class="form-actions"><button id="login-button" class="btn-primary login-submit" type="submit">Sign In</button></div>
          <div id="login-error" class="form-status" aria-live="assertive"></div>
        </form>
      </div>

    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/properties-data.js"></script>
  <script src="js/main.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script src="js/auth.js"></script>
</body>
</html>
