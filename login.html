<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Brandy Renon</title>
  <meta name="description" content="Private demo login page for the Colorado real estate admin portal.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-nav"></div>

  <main id="main-content" class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="login-brand">
        <span class="eyebrow">Private access</span>
        <h1 id="login-title">Admin Portal</h1>
        <p>Authorized users only. Session data is stored.</p>
      </div>
      <form id="login-form" action="javascript:void(0);" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button id="login-button" class="btn-primary" type="button">Login</button>
        <div id="login-error" aria-live="assertive"></div>
      </form>
    </section>
  </main>

  <div id="site-footer"></div>

<script src="js/properties-data.js"></script>
<script src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
