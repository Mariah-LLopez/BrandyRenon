<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Brandy Renon</title>
  <meta name="description" content="Private demo login page for the Colorado real estate admin portal.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-nav"></div>

  <main id="main-content" class="login-shell">
    <!-- SECURITY NOTE: This login page is a client-side demo only and must be replaced with secure server-side authentication before production deployment. -->
    <section class="login-card" aria-labelledby="login-title">
      <div class="login-brand">
        <span class="eyebrow">Private access</span>
        <h1 id="login-title">Brandy Renon Admin Portal</h1>
        <p>Authorized users only. Session data is stored in sessionStorage for this demonstration.</p>
      </div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn-primary" type="submit">Login</button>
        <div id="login-error" aria-live="assertive"></div>
      </form>
      <div class="login-demo-credentials">
        <p><strong>Demo credentials</strong></p>
        <p>Admin: <code>ColoradoAccess2026 / Murdock&amp;Murphy2026</code></p>
        <p>Viewer: <code>ColoradoAccessUser2026 / Murdock&amp;Murphy26</code></p>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/properties-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
